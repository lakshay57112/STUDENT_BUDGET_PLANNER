{% extends "base.html" %}
{% block title %}Create Account · BudgetPal{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-mark large"><i class="bi bi-wallet2"></i></span>
            <h1>Create your account</h1>
            <p>Start tracking your money in minutes.</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
                <label class="form-label">Full name</label>
                <input type="text" name="full_name" class="form-control" placeholder="e.g. Lakshay" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@student.edu" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="At least 6 characters" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary-app w-100">Create account</button>
        </form>

        <p class="auth-switch">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}

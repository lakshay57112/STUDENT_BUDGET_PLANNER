{% extends "base.html" %}
{% block title %}Log in · BudgetPal{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-mark large"><i class="bi bi-wallet2"></i></span>
            <h1>Welcome back</h1>
            <p>Log in to see your budget.</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@student.edu" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-primary-app w-100">Log in</button>
        </form>

        <p class="auth-switch">
            New here? <a href="{{ url_for('register') }}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
